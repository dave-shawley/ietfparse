[project]
site_name = "ietfparse"
site_author = "Dave Shawley"
site_url = "https://dave-shawley.github.io/ietfparse"
repo_url = "https://github.com/dave-shawley/ietfparse"
copyright = "&copy; 2014-2026, Dave Shawley"
nav = [
  { "Home" = "index.md" },
  { "Learning" = [
    "algorithms.md",
    "header-parsing.md",
    "benchmarks.md",
    "comparisons.md"
  ] },
  { "Reference" = [
    { "API Reference" = [
      "api/algorithms.md",
      "api/constants.md",
      "api/datastructures.md",
      "api/errors.md",
      "api/headers.md",
      "api/test.md"
    ] },
    { "RFCs" = "rfcs.md" },
    { "Contributing" = "contributing.md" },
    { "Changelog" = "changelog.md" },
  ] },
]
extra_css = ["overrides/extra.css"]

[project.theme]
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "toc.follow",
  "toc.integrate",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.ietflinks]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true
toc_depth = 2

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.magiclink]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.plugins.mkdocstrings]
enable_inventory = true

[project.plugins.mkdocstrings.handlers.python]
inventories = [
  "https://docs.python.org/3/objects.inv",
]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "sphinx"
show_bases = false
inherited_members = true
show_source = false
show_root_heading = true
show_symbol_type_heading = true
show_symbol_type_toc = true
unwrap_annotated = true
summary = true
merge_init_into_class = true
relative_crossrefs = true
