version: 2
updates:
  - package-ecosystem: "github-actions"
    schedule:
      interval: "weekly"
  - package-ecosystem: "uv"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
      semver-major-days: 14
    groups:
      security:
        applies-to: security-updates
      # PRs for minor/patch updates development dependencies
      # group multiple dependencies into a single PR
      development-tools:
        dependency-type: development
        update-types:
          - minor
          - patch
